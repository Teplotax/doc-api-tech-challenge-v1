name: "2 - [DEV] Build and Deploy"

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Redoc site
        run: |
          mkdir -p site
          cp openapi.json site/openapi.json
          cp favicon.ico site/favicon.ico
          cp favicon-32x32.png site/favicon-32x32.png
          cp favicon-16x16.png site/favicon-16x16.png
          cp apple-touch-icon.png site/apple-touch-icon.png
          cp android-chrome-192x192.png site/android-chrome-192x192.png
          cp android-chrome-512x512.png site/android-chrome-512x512.png
          cp site.webmanifest site/site.webmanifest
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <title>G52 Tech Challenge API</title>
              <meta charset="utf-8"/>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" rel="stylesheet">
              <!-- Standard favicons -->
              <link rel="icon" href="/favicon.ico" sizes="32x32">
              <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32">
              <link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16">
              <!-- Apple devices -->
              <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
              <!-- Android / PWA -->
              <link rel="manifest" href="/site.webmanifest">
              <meta name="theme-color" content="#ffffff">
              <style>
                body { margin: 0; padding: 0; }
                h1, h2, h3 {
                  margin-top: 12px !important;
                  margin-bottom: 4px !important;
                }
                p {
                  margin-top: 4px !important;
                  margin-bottom: 4px !important;
                }
              </style>
            </head>
            <body>
              <redoc
                spec-url='openapi.json'
                hide-download-button
                expand-responses="200"
                expand-single-schema-field
                json-sample-expand-level="3"
                path-in-middle-panel
              ></redoc>
              <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
            </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

  create:
    name: Create PR
    needs: [deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          git fetch --all

          LAST=$(git for-each-ref \
            --format='%(refname:short)' \
            refs/remotes/origin/release/v* \
            | sed 's|origin/release/v||' \
            | sort -V \
            | tail -n 1)

          if [ -z "$LAST" ]; then
            NEXT="0.0.1"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST"
            PATCH=$((PATCH + 1))
            NEXT="$MAJOR.$MINOR.$PATCH"
          fi

          echo "next_version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create or reuse release branch
        id: branch
        run: |
          VERSION="${{ steps.version.outputs.next_version }}"
          BRANCH="release/v$VERSION"

          git fetch --all

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch already exists. Reusing."
          else
            git checkout main
            git pull origin main
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
          fi

          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create PR (develop → release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch_name }}"

          EXISTS=$(gh pr list \
            --head develop \
            --base "$BRANCH" \
            --state open \
            --json number \
            --jq 'length')

          if [ "$EXISTS" -eq "0" ]; then
            gh pr create \
              --base "$BRANCH" \
              --head develop \
              --title "Release $BRANCH" \
              --body "Promoting develop into $BRANCH"
          else
            echo "PR already exists. Skipping."
          fi